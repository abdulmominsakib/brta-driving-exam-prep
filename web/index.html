        <!-- Favicons -->
        <link

        <title>BRTA Driving Exam Prep | Practice Tests & Road Signs</title>

        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "BRTA Driving Exam Prep",
                "applicationCategory": "EducationalApplication",
                "operatingSystem": "Web",
                "description": "A web app to help learners prepare for the BRTA driving license exam with practice questions and road sign learning.",
                "inLanguage": "en"
            }
        </script>

        <style>
            :root {
                --bg: #f8fafc;
                --card-bg: #ffffff;
                --text-primary: #0f172a;
                --text-secondary: #64748b;
                --accent: #58cc02;
                --accent-soft: #dcfce7;
                --ring: rgba(88, 204, 2, 0.2);
                --shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
                --eye-bg: #ffffff;
                --eye-pupil: #0d161b;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #0b1220;
                    --card-bg: #111827;
                    --text-primary: #e5e7eb;
                    --text-secondary: #94a3b8;
                    --accent: #7ddc42;
                    --accent-soft: rgba(125, 220, 66, 0.16);
                    --ring: rgba(125, 220, 66, 0.25);
                    --shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
                    --eye-bg: #dbe5ef;
                    --eye-pupil: #0b1220;
                }
            }

            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                background: var(--bg);
                overflow: hidden;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
            }

            #app-loader {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: var(--bg);
                z-index: 9999;
                opacity: 1;
                visibility: visible;
                transition:
                    opacity 280ms ease,
                    visibility 280ms ease;
            }

            .loader {
                position: relative;
                width: 108px;
                display: flex;
                justify-content: space-between;
            }

            .top-eye {
                margin-bottom: 16px;
                pointer-events: none;
            }

            .loader::after,
            .loader::before {
                content: "";
                display: inline-block;
                width: 48px;
                height: 48px;
                background-color: var(--eye-bg);
                background-image: radial-gradient(
                    circle 14px,
                    var(--eye-pupil) 100%,
                    transparent 0
                );
                background-repeat: no-repeat;
                border-radius: 50%;
                animation:
                    eyeMove 10s infinite,
                    blink 10s infinite;
            }

            @keyframes eyeMove {
                0%,
                10% {
                    background-position: 0px 0px;
                }
                13%,
                40% {
                    background-position: -15px 0px;
                }
                43%,
                70% {
                    background-position: 15px 0px;
                }
                73%,
                90% {
                    background-position: 0px 15px;
                }
                93%,
                100% {
                    background-position: 0px 0px;
                }
            }

            @keyframes blink {
                0%,
                10%,
                12%,
                20%,
                22%,
                40%,
                42%,
                60%,
                62%,
                70%,
                72%,
                90%,
                92%,
                98%,
                100% {
                    height: 48px;
                }
                11%,
                21%,
                41%,
                61%,
                71%,
                91%,
                99% {
                    height: 18px;
                }
            }

            #app-loader.loader-hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            .loader-card {
                width: min(88vw, 320px);
                background: var(--card-bg);
                border-radius: 22px;
                box-shadow: var(--shadow);
                padding: 24px 20px 20px;
                text-align: center;
                border: 1px solid var(--ring);
            }

            .logo-wrap {
                width: 64px;
                height: 64px;
                margin: 0 auto 14px;
                border-radius: 18px;
                background: var(--accent-soft);
                display: grid;
                place-items: center;
                animation: float 1.8s ease-in-out infinite;
            }

            .logo-wrap img {
                width: 38px;
                height: 38px;
                border-radius: 8px;
            }

            .loader-title {
                margin: 0;
                font-size: 18px;
                font-weight: 700;
                color: var(--text-primary);
                letter-spacing: 0.2px;
            }

            .loader-subtitle {
                margin: 6px 0 16px;
                font-size: 13px;
                color: var(--text-secondary);
                line-height: 1.45;
            }

            .progress-track {
                width: 100%;
                height: 8px;
                border-radius: 999px;
                overflow: hidden;
                background: rgba(148, 163, 184, 0.18);
            }

            .progress-fill {
                width: 35%;
                height: 100%;
                border-radius: inherit;
                background: linear-gradient(90deg, var(--accent), #8be84f);
                animation: loading 1.25s ease-in-out infinite;
                transform-origin: left center;
            }

            @keyframes loading {
                0% {
                    transform: translateX(-100%);
                }
                50% {
                    transform: translateX(80%);
                }
                100% {
                    transform: translateX(260%);
                }
            }

            @keyframes float {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-4px);
                }
            }
        </style>
    </head>
    <body>
        <div id="app-loader" aria-live="polite" aria-label="অ্যাপ লোড হচ্ছে">
            <div class="loader top-eye" aria-hidden="true"></div>
            <div class="loader-card">
                <div class="logo-wrap">
                    <img
                        src="icons/android-chrome-192x192.png"
                        alt="ড্রাইভিং শিক্ষা লোগো"
                    />
                </div>
                <p class="loader-title">আপনার অ্যাপ প্রস্তুত করা হচ্ছে</p>
                <p class="loader-subtitle">
                    সবকিছু লোড হতে অনুগ্রহ করে একটু অপেক্ষা করুন।
                </p>
                <div
                    class="progress-track"
                    role="progressbar"
                    aria-valuemin="0"
                    aria-valuemax="100"
                >
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>

        <script>
            (function () {
                var loader = document.getElementById("app-loader");

                function hideLoader() {
                    if (!loader) return;
                    loader.classList.add("loader-hidden");
                    setTimeout(function () {
                        if (loader && loader.parentNode) {
                            loader.parentNode.removeChild(loader);
                        }
                    }, 320);
                }

                window.addEventListener("flutter-first-frame", hideLoader);
                setTimeout(hideLoader, 12000);
            })();
        </script>

        <script
            src="assets/packages/flutter_soloud/web/libflutter_soloud_plugin.js"
            defer
        ></script>
        <script
            src="assets/packages/flutter_soloud/web/init_module.dart.js"
            defer
        ></script>
        <script src="flutter_bootstrap.js" async></script>
    </body>
</html>
